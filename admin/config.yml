backend:
  name: github
  repo: danica-books/danica-books.github.io
  branch: main
  auth_type: implicit
  app_id: Ov23livR0rVgO4SeyLkX

media_folder: "images"
public_folder: "/images"

collections:
  - name: "books"
    label: "Könyvek"
    folder: "data/books"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Cím", name: "title", widget: "string" }
      - { label: "Leírás", name: "description", widget: "text" }
      - { label: "Borító", name: "cover", widget: "image" }
      - { label: "PDF", name: "download", widget: "file" }
