backend:
  name: github
  repo: danica-books/danica-books
  branch: main
  auth_type: implicit
  app_id: Ov23livR0rVgO4SeyLkX

media_folder: "images"
public_folder: "/danica-books/images"

publish_mode: simple

collections:
  - name: "books"
    label: "Könyvek"
    folder: "data/books"
    create: true
    format: "json"
    extension: "json"

    slug: "{{title}}"
    slug_encoding: "ascii"
    slug_clean_accents: true

    fields:
      - { label: "Cím", name: "title", widget: "string", required: true }
      - { label: "Leírás", name: "description", widget: "text", required: true }
      - { label: "Borító", name: "cover", widget: "image", required: true }
      - { label: "Letöltési link", name: "download", widget: "string", required: true }
